services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lume
      POSTGRES_PASSWORD: lume
      POSTGRES_DB: lume
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  whisper:
    build:
      context: ./services/whisper
    ports:
      - "8000:8000"
    environment:
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-small}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-auto}
      HF_TOKEN: ${HF_TOKEN:-}

volumes:
  postgres_data: